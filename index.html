<!DOCTYPE html>
<html>
<head>
    <title>For My Love ❤️</title>
    <style>
        body {
            background: #fff5f8;
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 40px;
            line-height: 1.8;
        }

        .letter {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #ff4d88;
        }
    </style>
</head>
<body>
    <div class="letter">
        <h1>To My Love ❤️</h1>

        <p>Dear Love,</p>

        <p>
            I made this website especially for you.
            Every moment with you is a memory I treasure.
        </p>

        <p>
            Thank you for your love, kindness, and all the happiness
            you bring into my life.
        </p>

        <p>
            No matter where life takes us, you'll always have a special
            place in my heart.
        </p>

        <p>Love always,</p>
        <p><strong>Your Name</strong></p>
    </div>
</body>
</html>
